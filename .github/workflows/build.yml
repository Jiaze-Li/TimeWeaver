name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  macos-build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app bundle
        run: |
          chmod +x ./build_native_app.sh
          chmod +x ./create_dmg.sh
          ./build_native_app.sh
          ./create_dmg.sh

      - name: Archive app bundle
        uses: actions/upload-artifact@v4
        with:
          name: TimeWeaver-app
          path: build/TimeWeaver.app

      - name: Archive DMG
        uses: actions/upload-artifact@v4
        with:
          name: TimeWeaver-dmg
          path: build/TimeWeaver.dmg
